<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Biblioteca Inteligente ULEAM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-header">
      <div style="font-size: 40px; margin-bottom: 10px;">📚</div>
      <h1>Biblioteca Inteligente</h1>
      <p>Universidad Laica Eloy Alfaro de Manabí</p>
    </div>
    
    <div class="login-form">
      <h2 style="text-align: center; margin-bottom: 25px; font-weight: 700; color: var(--text-main); font-size: 1.4rem;">Iniciar Sesión</h2>
      
      <div class="quick-access-box">
        <h5>Acceso Rápido de Pruebas</h5>
        <div class="quick-access-buttons">
          <button type="button" onclick="setQuickLogin('estudiante@uleam.edu.ec')">Estudiante</button>
          <button type="button" onclick="setQuickLogin('docente@uleam.edu.ec')">Docente</button>
          <button type="button" onclick="setQuickLogin('admin@uleam.edu.ec')">Administrador</button>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo Institucional</label>
        <input type="email" id="email" placeholder="ejemplo@uleam.edu.ec" required>
      </div>

      <div class="form-group" style="margin-bottom: 25px;">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button onclick="handleLogin()" class="btn btn-primary btn-lg" style="width: 100%; justify-content: center;">
        Ingresar al Sistema
      </button>

      <p style="text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted);">
        ¿No tienes cuenta? <a href="#" onclick="showRegisterModal()" style="color: var(--primary); font-weight: 600; text-decoration: none;">Regístrate aquí</a>
      </p>
    </div>
  </div>

  <!-- Modal de Registro -->
  <div class="modal-overlay" id="registerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h4>Registrar Nuevo Usuario</h4>
        <button class="btn-close" onclick="closeRegisterModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="regId">Matrícula / Cédula</label>
          <input type="text" id="regId" placeholder="Ej. 1003">
        </div>
        <div class="form-group">
          <label for="regNombre">Nombre Completo</label>
          <input type="text" id="regNombre" placeholder="Ej. Ana María Castro">
        </div>
        <div class="form-group">
          <label for="regCarrera">Carrera / Facultad</label>
          <input type="text" id="regCarrera" placeholder="Ej. Enfermería">
        </div>
        <div class="form-group">
          <label for="regTelefono">Teléfono</label>
          <input type="text" id="regTelefono" placeholder="Ej. 0991122334">
        </div>
        <div class="form-group">
          <label for="regEmail">Correo Institucional</label>
          <input type="email" id="regEmail" placeholder="Ej. ana.castro@uleam.edu.ec">
        </div>
        <div class="form-group">
          <label for="regRol">Rol</label>
          <select id="regRol">
            <option value="Estudiante">Estudiante</option>
            <option value="Docente">Docente</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeRegisterModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="handleRegister()">Registrarse</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Cargar estado global local -->
  <script src="app-state.js"></script>
  <script>
    // Mostrar notificaciones flotantes
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let icon = '💡';
      if (type === 'success') icon = '✅';
      if (type === 'danger') icon = '❌';
      if (type === 'warning') icon = '⚠️';
      
      toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // Configurar acceso rápido
    function setQuickLogin(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = "123456";
      handleLogin();
    }

    // Procesar Inicio de Sesión
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showToast("Por favor, ingresa tu correo institucional.", "warning");
        return;
      }

      const res = AppState.login(email);
      if (res.success) {
        showToast(`¡Bienvenido de vuelta, ${res.user.nombre}!`, "success");
        setTimeout(() => {
          if (res.user.rol === 'Administrador') {
            window.location.href = "dashboard-admin.html";
          } else {
            window.location.href = "dashboard-estudiante.html";
          }
        }, 800);
      } else {
        showToast(res.message, "danger");
      }
    }

    // Modales de Registro
    function showRegisterModal() {
      document.getElementById('registerModal').classList.add('show');
    }
    function closeRegisterModal() {
      document.getElementById('registerModal').classList.remove('show');
    }

    // Procesar Registro
    function handleRegister() {
      const id = document.getElementById('regId').value.trim();
      const nombre = document.getElementById('regNombre').value.trim();
      const carrera = document.getElementById('regCarrera').value.trim();
      const telefono = document.getElementById('regTelefono').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const rol = document.getElementById('regRol').value;

      if (!id || !nombre || !carrera || !telefono || !email) {
        showToast("Por favor, llena todos los campos.", "warning");
        return;
      }

      // Validar si usuario ya existe
      const exist = AppState.getUsuarios().find(u => u.id === id || u.email.toLowerCase() === email.toLowerCase());
      if (exist) {
        showToast("El ID o Correo ya se encuentra registrado.", "danger");
        return;
      }

      const nuevoUsuario = { id, nombre, carrera, telefono, email, rol, estado: "Activo" };
      AppState.addUsuario(nuevoUsuario);
      
      closeRegisterModal();
      showToast("¡Registro exitoso! Ya puedes iniciar sesión.", "success");
      
      // Auto completar correo de registro
      document.getElementById('email').value = email;
      document.getElementById('password').value = "";
    }
  </script>
</body>
</html>
