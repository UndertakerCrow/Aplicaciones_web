<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quejas y Sugerencias - Biblioteca Inteligente ULEAM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">📚</div>
          <div class="brand-info">
            <h1>Biblio Inteligente</h1>
            <p>ULEAM Portal</p>
          </div>
        </div>
      </div>

      <div class="nav-menu">
        <a href="dashboard-estudiante.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Inicio</span>
        </a>
        <a href="catalogo.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.89 12.55L12 15.89l6.11-3.34c-1.83.62-3.87.95-6.11.95s-4.28-.33-6.11-.95z"/></svg>
          <span>Catálogo</span>
        </a>
        <a href="mis-prestamos.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
          <span>Mis Préstamos</span>
        </a>
        <a href="quejas.html" class="nav-link active">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          <span>Quejas / Sugerencias</span>
        </a>
        <a href="perfil.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span>Mi Perfil</span>
        </a>
      </div>

      <div class="sidebar-footer">
        <button onclick="handleLogout()" class="btn-logout">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          <span>Cerrar Sesión</span>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <div class="page-header">
        <div class="page-title">
          <h2>Quejas y Sugerencias</h2>
          <p>Ayúdanos a mejorar reportando incidentes con sensores, escáneres o catalogación</p>
        </div>
        
        <div class="user-profile-badge" onclick="window.location.href='perfil.html'">
          <div class="avatar-container" id="userAvatar">U</div>
          <div class="user-meta">
            <strong id="userName">Cargando...</strong>
            <span id="userRole">Estudiante</span>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; flex-wrap: wrap;">
        <!-- Formulario -->
        <div class="dashboard-card">
          <div class="card-title-bar">
            <h3>Enviar Reporte</h3>
          </div>
          
          <div class="form-group">
            <label for="complainSubject">Asunto / Tema</label>
            <input type="text" id="complainSubject" placeholder="Ej. Fallo en el escaneo de ISBN, error de sensor...">
          </div>

          <div class="form-group" style="margin-bottom: 25px;">
            <label for="complainDesc">Descripción Detallada</label>
            <textarea id="complainDesc" style="height: 150px;" placeholder="Describe detalladamente el problema experimentado en la biblioteca..."></textarea>
          </div>

          <button onclick="submitComplaint()" class="btn btn-primary" style="width: 100%; justify-content: center;">
            Enviar Queja / Sugerencia
          </button>
        </div>

        <!-- Historial del Estudiante -->
        <div class="dashboard-card">
          <div class="card-title-bar">
            <h3>Mis Reportes Enviados</h3>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Asunto</th>
                  <th>Fecha</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="studentComplaintsTable">
                <!-- JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Selector de Roles Flotante -->
  <div class="test-role-switcher">
    <span>Probar Rol:</span>
    <button class="role-btn active" onclick="window.location.href='dashboard-estudiante.html'">Estudiante</button>
    <button class="role-btn" onclick="window.location.href='dashboard-admin.html'">Admin</button>
  </div>

  <script src="app-state.js"></script>
  <script>
    // Validar sesión
    const loggedUser = AppState.getLoggedUser();
    if (!loggedUser) window.location.href = "index.html";

    document.getElementById('userName').innerText = loggedUser.nombre;
    document.getElementById('userRole').innerText = loggedUser.rol;
    document.getElementById('userAvatar').innerText = loggedUser.nombre.charAt(0);

    // Cargar historial de quejas del usuario activo
    function renderComplaints() {
      const allQuejas = AppState.getQuejas().filter(q => q.userId === loggedUser.id);
      const container = document.getElementById('studentComplaintsTable');

      if (allQuejas.length === 0) {
        container.innerHTML = `
          <tr>
            <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 30px;">
              Aún no has registrado ninguna queja o sugerencia.
            </td>
          </tr>
        `;
        return;
      }

      let html = '';
      allQuejas.forEach(q => {
        let badgeClass = 'badge-info';
        if (q.estado === 'Resuelto') badgeClass = 'badge-success';
        if (q.estado === 'En Proceso') badgeClass = 'badge-warning';

        html += `
          <tr>
            <td style="font-weight: 600; font-size: 0.9rem;" title="${q.descripcion}">${q.asunto}</td>
            <td style="font-size: 0.85rem;">${formatDate(q.fecha)}</td>
            <td><span class="badge ${badgeClass}">${q.estado}</span></td>
          </tr>
        `;
      });
      container.innerHTML = html;
    }

    // Submit
    function submitComplaint() {
      const subject = document.getElementById('complainSubject').value.trim();
      const desc = document.getElementById('complainDesc').value.trim();

      if (!subject || !desc) {
        showToast("Por favor, rellena todos los campos del reporte.", "warning");
        return;
      }

      AppState.enviarQueja(subject, desc, loggedUser.id);
      
      document.getElementById('complainSubject').value = '';
      document.getElementById('complainDesc').value = '';
      
      showToast("Tu reporte ha sido enviado al equipo de administración del ULEAM. ¡Gracias!", "success");
      renderComplaints();
    }

    function formatDate(dateStr) {
      const options = { year: 'numeric', month: 'numeric', day: 'numeric' };
      const date = new Date(dateStr + "T00:00:00");
      return date.toLocaleDateString('es-EC', options);
    }

    // Notificaciones
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let icon = '💡';
      if (type === 'success') icon = '✅';
      if (type === 'danger') icon = '❌';
      if (type === 'warning') icon = '⚠️';
      
      toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function handleLogout() {
      AppState.logout();
      window.location.href = "index.html";
    }

    // Inicializar
    renderComplaints();
  </script>
</body>
</html>
