<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - Biblioteca Inteligente ULEAM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">📚</div>
          <div class="brand-info">
            <h1>Biblio Inteligente</h1>
            <p>ULEAM Portal</p>
          </div>
        </div>
      </div>

      <div class="nav-menu">
        <a href="dashboard-estudiante.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Inicio</span>
        </a>
        <a href="catalogo.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.89 12.55L12 15.89l6.11-3.34c-1.83.62-3.87.95-6.11.95s-4.28-.33-6.11-.95z"/></svg>
          <span>Catálogo</span>
        </a>
        <a href="mis-prestamos.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
          <span>Mis Préstamos</span>
        </a>
        <a href="quejas.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          <span>Quejas / Sugerencias</span>
        </a>
        <a href="perfil.html" class="nav-link active">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span>Mi Perfil</span>
        </a>
      </div>

      <div class="sidebar-footer">
        <button onclick="handleLogout()" class="btn-logout">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          <span>Cerrar Sesión</span>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <div class="page-header">
        <div class="page-title">
          <h2>Mi Perfil</h2>
          <p>Gestiona tu información personal y configuración del sistema</p>
        </div>
        
        <div class="user-profile-badge">
          <div class="avatar-container" id="userAvatar">U</div>
          <div class="user-meta">
            <strong id="userName">Cargando...</strong>
            <span id="userRole">Estudiante</span>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px; align-items: start; flex-wrap: wrap;">
        <!-- Avatar y Acciones Rápidas -->
        <div class="dashboard-card" style="text-align: center;">
          <div class="avatar-container" id="largeAvatar" style="width: 100px; height: 100px; font-size: 40px; margin: 0 auto 20px;">U</div>
          <h3 id="profileName" style="font-weight: 700; margin-bottom: 5px;">Cargando...</h3>
          <p id="profileRole" style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 25px;">Estudiante</p>
          
          <button onclick="openPasswordModal()" class="btn btn-outline" style="width: 100%; justify-content: center; margin-bottom: 10px;">
            🔑 Cambiar Contraseña
          </button>
          <button onclick="handleLogout()" class="btn btn-danger" style="width: 100%; justify-content: center; background: transparent; border-color: var(--danger); color: var(--danger);">
            Cerrar Sesión
          </button>
        </div>

        <!-- Formulario de Información -->
        <div class="dashboard-card">
          <div class="card-title-bar">
            <h3>Información del Usuario</h3>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-wrap: wrap;">
            <div class="form-group">
              <label for="profId">Matrícula / ID</label>
              <input type="text" id="profId" readonly style="background: #f1f5f9; cursor: not-allowed; color: var(--text-muted);">
            </div>
            
            <div class="form-group">
              <label for="profEmail">Correo Institucional</label>
              <input type="email" id="profEmail" readonly style="background: #f1f5f9; cursor: not-allowed; color: var(--text-muted);">
            </div>
          </div>

          <div class="form-group">
            <label for="profNombre">Nombre Completo</label>
            <input type="text" id="profNombre" placeholder="Tu nombre completo">
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-wrap: wrap;">
            <div class="form-group">
              <label for="profCarrera">Carrera / Facultad</label>
              <input type="text" id="profCarrera" placeholder="Ingeniería, Derecho, etc.">
            </div>

            <div class="form-group">
              <label for="profTelefono">Teléfono de Contacto</label>
              <input type="text" id="profTelefono" placeholder="Ej. 0987654321">
            </div>
          </div>

          <div style="margin-top: 25px; display: flex; justify-content: flex-end;">
            <button onclick="saveProfile()" class="btn btn-primary btn-lg">
              Guardar Cambios
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Cambiar Contraseña -->
  <div class="modal-overlay" id="passwordModal">
    <div class="modal-content">
      <div class="modal-header">
        <h4>Cambiar Contraseña</h4>
        <button class="btn-close" onclick="closePasswordModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="oldPassword">Contraseña Actual</label>
          <input type="password" id="oldPassword" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label for="newPassword">Nueva Contraseña</label>
          <input type="password" id="newPassword" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label for="confirmNewPassword">Confirmar Nueva Contraseña</label>
          <input type="password" id="confirmNewPassword" placeholder="••••••••">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closePasswordModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="changePassword()">Actualizar Contraseña</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Selector de Roles Flotante -->
  <div class="test-role-switcher">
    <span>Probar Rol:</span>
    <button class="role-btn active" onclick="window.location.href='dashboard-estudiante.html'">Estudiante</button>
    <button class="role-btn" onclick="window.location.href='dashboard-admin.html'">Admin</button>
  </div>

  <script src="app-state.js"></script>
  <script>
    // Validar sesión
    const loggedUser = AppState.getLoggedUser();
    if (!loggedUser) window.location.href = "index.html";

    // Cargar perfil
    function loadProfile() {
      document.getElementById('userName').innerText = loggedUser.nombre;
      document.getElementById('userRole').innerText = loggedUser.rol;
      document.getElementById('userAvatar').innerText = loggedUser.nombre.charAt(0);

      document.getElementById('largeAvatar').innerText = loggedUser.nombre.charAt(0);
      document.getElementById('profileName').innerText = loggedUser.nombre;
      document.getElementById('profileRole').innerText = loggedUser.rol;

      document.getElementById('profId').value = loggedUser.id;
      document.getElementById('profEmail').value = loggedUser.email;
      document.getElementById('profNombre').value = loggedUser.nombre;
      document.getElementById('profCarrera').value = loggedUser.carrera;
      document.getElementById('profTelefono').value = loggedUser.telefono;
    }

    // Guardar cambios
    function saveProfile() {
      const nombre = document.getElementById('profNombre').value.trim();
      const carrera = document.getElementById('profCarrera').value.trim();
      const telefono = document.getElementById('profTelefono').value.trim();

      if (!nombre || !carrera || !telefono) {
        showToast("Por favor, llena todos los campos editables.", "warning");
        return;
      }

      const updated = AppState.updateUsuario(loggedUser.id, { nombre, carrera, telefono });
      if (updated) {
        showToast("¡Tu perfil ha sido actualizado con éxito!", "success");
        // Forzar recarga de datos en pantalla
        setTimeout(() => window.location.reload(), 1000);
      } else {
        showToast("Ocurrió un error al actualizar los datos.", "danger");
      }
    }

    // Modal Contraseña
    function openPasswordModal() {
      document.getElementById('passwordModal').classList.add('show');
    }
    function closePasswordModal() {
      document.getElementById('passwordModal').classList.remove('show');
      document.getElementById('oldPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmNewPassword').value = '';
    }

    function changePassword() {
      const oldPass = document.getElementById('oldPassword').value;
      const newPass = document.getElementById('newPassword').value;
      const confPass = document.getElementById('confirmNewPassword').value;

      if (!oldPass || !newPass || !confPass) {
        showToast("Por favor, completa todos los campos de contraseña.", "warning");
        return;
      }

      if (newPass !== confPass) {
        showToast("Las contraseñas nuevas no coinciden.", "danger");
        return;
      }

      // Simulado exitoso
      closePasswordModal();
      showToast("¡Contraseña actualizada correctamente!", "success");
    }

    // Notificaciones
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let icon = '💡';
      if (type === 'success') icon = '✅';
      if (type === 'danger') icon = '❌';
      if (type === 'warning') icon = '⚠️';
      
      toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function handleLogout() {
      AppState.logout();
      window.location.href = "index.html";
    }

    // Iniciar
    loadProfile();
  </script>
</body>
</html>
