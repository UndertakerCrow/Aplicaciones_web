<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Libros - Biblioteca Inteligente ULEAM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon">📚</div>
          <div class="brand-info">
            <h1>Biblio Inteligente</h1>
            <p>ULEAM Portal</p>
          </div>
        </div>
      </div>

      <div class="nav-menu">
        <a href="dashboard-estudiante.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Inicio</span>
        </a>
        <a href="catalogo.html" class="nav-link active">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.89 12.55L12 15.89l6.11-3.34c-1.83.62-3.87.95-6.11.95s-4.28-.33-6.11-.95z"/></svg>
          <span>Catálogo</span>
        </a>
        <a href="mis-prestamos.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
          <span>Mis Préstamos</span>
        </a>
        <a href="quejas.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          <span>Quejas / Sugerencias</span>
        </a>
        <a href="perfil.html" class="nav-link">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <span>Mi Perfil</span>
        </a>
      </div>

      <div class="sidebar-footer">
        <button onclick="handleLogout()" class="btn-logout">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          <span>Cerrar Sesión</span>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <div class="page-header">
        <div class="page-title">
          <h2>Catálogo de Libros</h2>
          <p>Explora y solicita material bibliográfico de forma instantánea</p>
        </div>
        
        <div class="user-profile-badge" onclick="window.location.href='perfil.html'">
          <div class="avatar-container" id="userAvatar">U</div>
          <div class="user-meta">
            <strong id="userName">Cargando...</strong>
            <span id="userRole">Estudiante</span>
          </div>
        </div>
      </div>

      <!-- Filtros de búsqueda -->
      <div class="dashboard-card" style="padding: 20px; margin-bottom: 25px;">
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
          <div style="flex-grow: 1; min-width: 250px;">
            <input type="text" id="searchInput" placeholder="Buscar por título, autor o categoría..." oninput="filterBooks()">
          </div>
          <div style="width: 200px;">
            <select id="categoryFilter" onchange="filterBooks()">
              <option value="">Todas las categorías</option>
              <!-- Dinámico -->
            </select>
          </div>
        </div>
      </div>

      <!-- Grid de Libros -->
      <div class="books-grid" id="catalogGrid">
        <!-- Inyectado por JS -->
      </div>
    </div>
  </div>

  <!-- Modal Detalle del Libro y Préstamo -->
  <div class="modal-overlay" id="bookModal">
    <div class="modal-content">
      <div class="modal-header">
        <h4 id="modalBookTitle">Detalles del Libro</h4>
        <button class="btn-close" onclick="closeBookModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBookBody">
        <!-- Inyectado por JS -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeBookModal()">Cerrar</button>
        <button class="btn btn-primary" id="btnRequestLoan" onclick="confirmLoan()">Solicitar Préstamo</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Selector de Roles Flotante -->
  <div class="test-role-switcher">
    <span>Probar Rol:</span>
    <button class="role-btn active" onclick="window.location.href='dashboard-estudiante.html'">Estudiante</button>
    <button class="role-btn" onclick="window.location.href='dashboard-admin.html'">Admin</button>
  </div>

  <script src="app-state.js"></script>
  <script>
    // Validar sesión
    const loggedUser = AppState.getLoggedUser();
    if (!loggedUser) window.location.href = "index.html";

    document.getElementById('userName').innerText = loggedUser.nombre;
    document.getElementById('userRole').innerText = loggedUser.rol;
    document.getElementById('userAvatar').innerText = loggedUser.nombre.charAt(0);

    let selectedBookId = null;

    // Obtener parámetros de búsqueda (por ejemplo, desde recomendados)
    const urlParams = new URLSearchParams(window.location.search);
    const searchParam = urlParams.get('search');
    if (searchParam) {
      document.getElementById('searchInput').value = searchParam;
    }

    // Inicializar categorías en el dropdown
    const libros = AppState.getLibros();
    const categorias = [...new Set(libros.map(l => l.categoria))];
    const catSelect = document.getElementById('categoryFilter');
    categorias.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.innerText = c;
      catSelect.appendChild(opt);
    });

    // Renderizar catálogo
    function renderCatalog(booksList) {
      const grid = document.getElementById('catalogGrid');
      if (booksList.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
            <h3>No se encontraron libros para tu búsqueda</h3>
            <p>Intenta con otros términos.</p>
          </div>
        `;
        return;
      }

      let html = '';
      booksList.forEach(l => {
        const badgeClass = l.stock > 0 ? 'available' : 'empty';
        const badgeText = l.stock > 0 ? `Disp: ${l.stock}` : 'Agotado';
        
        html += `
          <div class="book-card">
            <div class="book-cover-mock" style="background: ${l.color}">
              <span class="category">${l.categoria}</span>
              <span class="cover-title">${l.titulo}</span>
            </div>
            <div class="book-details">
              <h4>${l.titulo}</h4>
              <p class="author">${l.autor}</p>
              <div class="meta">
                <span class="stock-badge ${badgeClass}">${badgeText}</span>
                <button onclick="openBookModal(${l.id})" class="btn btn-primary btn-sm">Ver Detalles</button>
              </div>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    // Filtrar libros en tiempo real
    function filterBooks() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;

      const filtrados = AppState.getLibros().filter(l => {
        const matchesSearch = l.titulo.toLowerCase().includes(search) || 
                              l.autor.toLowerCase().includes(search) || 
                              l.categoria.toLowerCase().includes(search);
        const matchesCat = cat === '' || l.categoria === cat;
        return matchesSearch && matchesCat;
      });

      renderCatalog(filtrados);
    }

    // Modal de Detalle
    function openBookModal(id) {
      selectedBookId = id;
      const l = AppState.getLibros().find(book => book.id === id);
      if (!l) return;

      document.getElementById('modalBookTitle').innerText = l.titulo;
      
      const config = AppState.getConfig();
      const isAvailable = l.stock > 0;
      
      let bodyHtml = `
        <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
          <div class="book-cover-mock" style="background: ${l.color}; width: 140px; height: 200px; flex-shrink: 0;">
            <span class="cover-title" style="font-size: 0.75rem;">${l.titulo}</span>
          </div>
          <div style="flex-grow: 1; min-width: 200px;">
            <table style="width: 100%; border: none; box-shadow: none;">
              <tr style="border: none; background: transparent;"><td style="padding: 4px 0; font-weight: 600; color: var(--text-muted); width: 100px;">Autor:</td><td style="padding: 4px 0;">${l.autor}</td></tr>
              <tr style="border: none; background: transparent;"><td style="padding: 4px 0; font-weight: 600; color: var(--text-muted);">Categoría:</td><td style="padding: 4px 0;">${l.categoria}</td></tr>
              <tr style="border: none; background: transparent;"><td style="padding: 4px 0; font-weight: 600; color: var(--text-muted);">Año:</td><td style="padding: 4px 0;">${l.anio}</td></tr>
              <tr style="border: none; background: transparent;"><td style="padding: 4px 0; font-weight: 600; color: var(--text-muted);">Páginas:</td><td style="padding: 4px 0;">${l.paginas} pág.</td></tr>
              <tr style="border: none; background: transparent;"><td style="padding: 4px 0; font-weight: 600; color: var(--text-muted);">ISBN:</td><td style="padding: 4px 0; font-size: 0.85rem;">${l.isbn}</td></tr>
              <tr style="border: none; background: transparent;"><td style="padding: 4px 0; font-weight: 600; color: var(--text-muted);">Ubicación:</td><td style="padding: 4px 0;">Sección ${l.categoria.split(' ')[0]}</td></tr>
            </table>
          </div>
        </div>

        <div style="margin-top: 25px; padding: 15px; border-radius: var(--radius-sm); background: #f8fafc; border: 1px solid var(--border);">
          <h5 style="margin-bottom: 8px; font-weight: 700; color: var(--text-main);">Información de Préstamo</h5>
          <ul style="list-style-type: none; font-size: 0.85rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 5px;">
            <li>⏱️ Plazo máximo de préstamo: <strong>${config.diasMaximo} días</strong></li>
            <li>⚠️ Multa por retraso: <strong>$${config.multaDia.toFixed(2)} por día atrasado</strong></li>
            <li>📦 Stock disponible en estantería: <strong>${l.stock} unidades</strong></li>
          </ul>
        </div>
      `;
      
      document.getElementById('modalBookBody').innerHTML = bodyHtml;

      const btn = document.getElementById('btnRequestLoan');
      if (isAvailable) {
        btn.disabled = false;
        btn.style.display = 'inline-flex';
      } else {
        btn.disabled = true;
        btn.style.display = 'none';
      }

      document.getElementById('bookModal').classList.add('show');
    }

    function closeBookModal() {
      document.getElementById('bookModal').classList.remove('show');
    }

    // Confirmar Préstamo
    function confirmLoan() {
      if (!selectedBookId) return;

      const res = AppState.solicitarPrestamo(selectedBookId, loggedUser.id);
      closeBookModal();

      if (res.success) {
        showToast("¡Préstamo concedido con éxito! Retira el libro en la puerta inteligente.", "success");
        filterBooks(); // Refrescar stock en pantalla
      } else {
        showToast(res.message, "danger");
      }
    }

    // Notificaciones
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let icon = '💡';
      if (type === 'success') icon = '✅';
      if (type === 'danger') icon = '❌';
      if (type === 'warning') icon = '⚠️';
      
      toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function handleLogout() {
      AppState.logout();
      window.location.href = "index.html";
    }

    // Renderizado Inicial
    filterBooks();
  </script>
</body>
</html>
