<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operaciones Matemáticas</title>
    <link rel="stylesheet" href="07-05-2026.css">
</head>
<body>
    <div class="card">
        <h1>Calculadora de Operaciones</h1>
        <div class="input-group">
            <div>
                <label for="numero1">Número 1</label>
                <input type="number" id="numero1" placeholder="Introduce el primer número" />
            </div>
            <div>
                <label for="numero2">Número 2</label>
                <input type="number" id="numero2" placeholder="Introduce el segundo número" />
            </div>
        </div>

        <button id="calcularBtn">Calcular operaciones</button>
        <div id="error" class="error" aria-live="polite"></div>

        <div class="results" id="resultados">
            <div class="result-item"><span>Suma:</span><span id="suma">-</span></div>
            <div class="result-item"><span>Resta:</span><span id="resta">-</span></div>
            <div class="result-item"><span>Multiplicación:</span><span id="multiplicacion">-</span></div>
            <div class="result-item"><span>División:</span><span id="division">-</span></div>
            <div class="result-item"><span>Módulo:</span><span id="modulo">-</span></div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const numero1El = $('numero1');
        const numero2El = $('numero2');
        const errorEl = $('error');
        const resultadoIds = ['suma', 'resta', 'multiplicacion', 'division', 'modulo'];
        const resultadoEls = resultadoIds.map(id => $(id));
        const calcularBtn = $('calcularBtn');

        function calcularOperaciones() {
            const [n1, n2] = [numero1El.value, numero2El.value].map(v => v.trim() === '' ? null : Number(v));

            errorEl.textContent = '';
            resultadoEls.forEach(el => el.textContent = '-');

            if (n1 === null || n2 === null) {
                errorEl.textContent = 'Por favor ingresa ambos números.';
                return;
            }

            const resultados = [
                n1 + n2,
                n1 - n2,
                n1 * n2,
                n2 === 0 ? 'No se puede dividir por cero' : n1 / n2,
                n1 % n2
            ];

            resultadoEls.forEach((el, i) => el.textContent = resultados[i]);
        }

        calcularBtn.addEventListener('click', calcularOperaciones);
    </script>
</body>
</html>
