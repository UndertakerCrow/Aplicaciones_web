<!DOCTYPE html>
<html lang="es">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Datos de Clientes</title>
    </head>
    <body>
        <section id="first">
            <div id="contenedor">
                <br><br>
                <h1>Datos de Clientes</h1>
                <form action="" method="">
                    <h3>Cedula</h3>
                    <input class="ingresar" type="text" name="cedula" placeholder="Ingrese su cedula">
                    <h3>Nombre completo</h3>
                    <input class="ingresar" type="text" name="nombre" placeholder="Ingrese su nombre completo">
                    <h3>Telefono</h3>
                    <input class="ingresar" type="text" name="telefono" placeholder="Ingrese su numero de telefono">
                    <h3>Direccion</h3>
                    <input class="ingresar" type="text" name="direccion" placeholder="Ingrese su direccion">
                    <br><br>
                    <input class="boton" type="submit" value="Enviar">
                    <br><br>
                </form>
            </div>
        </section>
    </body>
</html>
