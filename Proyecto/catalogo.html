<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Biblioteca ULEAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <div class="w-72 bg-[#006633] text-white flex flex-col">
      <div class="p-6 border-b border-green-700">
        <h1 class="text-2xl font-bold">Biblioteca ULEAM</h1>
      </div>
      <nav class="p-4 space-y-1">
        <a href="dashboard-estudiante.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-home"></i> Inicio</a>
        <a href="catalogo.html" class="flex items-center gap-3 px-4 py-3 bg-green-700 rounded-xl"><i class="fas fa-book"></i> Catálogo</a>
        <a href="mis-prestamos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-hand-holding"></i> Mis Préstamos</a>
        <a href="quejas.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-exclamation-triangle"></i> Quejas</a>
        <a href="perfil.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-user"></i> Mi Perfil</a>
      </nav>

      <!-- Botón Salir -->
      <div class="p-4 border-t border-green-700 mt-auto">
        <button onclick="cerrarSesion()"
                class="w-full flex items-center justify-center gap-3 px-4 py-3 hover:bg-red-700 rounded-xl text-white transition">
          <i class="fas fa-sign-out-alt"></i>
          <span class="font-medium">Salir</span>
        </button>
      </div>
    </div>

    <div class="flex-1 overflow-auto">
      <header class="bg-white shadow p-5">
        <h2 class="text-2xl font-semibold">Catálogo de Libros</h2>
      </header>

      <div class="p-8">
        <div class="flex gap-4 mb-6">
          <input id="buscador" type="text" placeholder="Buscar por título, autor o año..." 
                 class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#006633]">
          </select>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="gridLibros">
          <!-- Llenado por JS -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const librosCatalogo = [
      {titulo:"Cien Años de Soledad", autor:"Gabriel García Márquez", año:1967},
      {titulo:"1984", autor:"George Orwell", año:1949},
      {titulo:"El Principito", autor:"Antoine de Saint-Exupéry", año:1943},
      {titulo:"Rayuela", autor:"Julio Cortázar", año:1963},
      {titulo:"Don Quijote", autor:"Miguel de Cervantes", año:1605},
    ];

    function renderCatalogo(filtro = '') {
      const container = document.getElementById('gridLibros');
      container.innerHTML = librosCatalogo.filter(l => 
        l.titulo.toLowerCase().includes(filtro) || 
        l.autor.toLowerCase().includes(filtro)
      ).map(l => `
        <div class="bg-white rounded-2xl overflow-hidden shadow hover:shadow-xl transition">
          <div class="h-60 bg-gray-200 flex items-center justify-center text-6xl">📖</div>
          <div class="p-4">
            <h4 class="font-semibold">${l.titulo}</h4>
            <p class="text-sm text-gray-500">${l.autor} (${l.año})</p>
            <button onclick="alert('Préstamo solicitado: ${l.titulo} (14 días)')" 
                    class="mt-4 w-full bg-[#006633] text-white py-2.5 rounded-xl">Solicitar Préstamo</button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('buscador').addEventListener('input', (e) => renderCatalogo(e.target.value.toLowerCase()));
    renderCatalogo();

    function cerrarSesion() {
      if (confirm("¿Estás seguro de que deseas cerrar sesión?")) {
        window.location.href = "index.html";
      }
    }
  </script>
</body>
</html>
