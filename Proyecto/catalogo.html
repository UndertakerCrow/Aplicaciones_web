<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Biblioteca ULEAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(to bottom, #f8fafc, #e2e8f0); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <div class="w-72 bg-[#006633] text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-green-700 bg-[#005522]">
        <h1 class="text-2xl font-bold flex items-center gap-3">
          <span class="text-3xl">📚</span> Biblioteca ULEAM
        </h1>
      </div>
      <nav class="p-4 flex-1 space-y-1">
        <a href="dashboard-estudiante.html" class="sidebar-link flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-2xl"><i class="fas fa-home"></i> Inicio</a>
        <a href="catalogo.html" class="sidebar-link flex items-center gap-3 px-4 py-3 bg-green-700 rounded-2xl"><i class="fas fa-book"></i> Catálogo</a>
        <a href="mis-prestamos.html" class="sidebar-link flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-2xl"><i class="fas fa-hand-holding"></i> Mis Préstamos</a>
        <a href="quejas.html" class="sidebar-link flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-2xl"><i class="fas fa-exclamation-triangle"></i> Quejas</a>
        <a href="perfil.html" class="sidebar-link flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-2xl"><i class="fas fa-user"></i> Mi Perfil</a>
      </nav>
      <div class="p-4 border-t border-green-700 mt-auto">
        <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 px-4 py-3 hover:bg-red-700 rounded-2xl text-white transition">
          <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
      </div>
    </div>

    <div class="flex-1 overflow-auto">
      <header class="bg-white shadow-sm border-b p-6">
        <h2 class="text-3xl font-semibold text-gray-800">Catálogo de Libros</h2>
      </header>

      <div class="p-8">
        <div class="flex gap-4 mb-8">
          <input id="buscador" type="text" placeholder="Buscar por título, autor o año..." 
                 class="flex-1 px-6 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-[#006633] text-lg">
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="gridLibros"></div>
      </div>
    </div>
  </div>

  <script>
    const librosCatalogo = [
      {titulo:"Cien Años de Soledad", autor:"Gabriel García Márquez", año:1967},
      {titulo:"1984", autor:"George Orwell", año:1949},
      {titulo:"El Principito", autor:"Antoine de Saint-Exupéry", año:1943},
      {titulo:"Rayuela", autor:"Julio Cortázar", año:1963},
      {titulo:"Don Quijote", autor:"Miguel de Cervantes", año:1605},
      {titulo:"Crónica de una muerte anunciada", autor:"Gabriel García Márquez", año:1981}
    ];

    function renderCatalogo(filtro = '') {
      const container = document.getElementById('gridLibros');
      container.innerHTML = librosCatalogo.filter(l => 
        l.titulo.toLowerCase().includes(filtro) || l.autor.toLowerCase().includes(filtro)
      ).map(l => `
        <div class="card-hover bg-white rounded-3xl overflow-hidden shadow">
          <div class="h-56 bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center text-7xl">📖</div>
          <div class="p-5">
            <h4 class="font-semibold text-lg">${l.titulo}</h4>
            <p class="text-gray-500 text-sm">${l.autor} (${l.año})</p>
            <button onclick="alert('Préstamo solicitado: ${l.titulo} (14 días)')" 
                    class="mt-5 w-full bg-[#006633] hover:bg-[#005522] text-white py-3 rounded-2xl font-medium">
              Solicitar Préstamo
            </button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('buscador').addEventListener('input', (e) => renderCatalogo(e.target.value.toLowerCase()));
    renderCatalogo();

    function cerrarSesion() {
      if (confirm("¿Estás seguro de que deseas cerrar sesión?")) window.location.href = "index.html";
    }
  </script>
</body>
</html>
