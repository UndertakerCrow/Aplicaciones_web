<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Biblioteca ULEAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #e2e8f0);
      min-height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #006633;
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.2);
    }
    .sidebar-header {
      padding: 25px;
      background: #005522;
      font-size: 1.8rem;
      font-weight: bold;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }
    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.15);
    }
    .main {
      margin-left: 280px;
      padding: 30px;
    }
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .search-box {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #ddd;
      border-radius: 16px;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 25px;
    }
    .book-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      transition: 0.3s;
    }
    .book-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 30px rgba(0,0,0,0.12);
    }
    .book-cover {
      height: 220px;
      background: linear-gradient(#e5e7eb, #cbd5e1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
    }
    button {
      background: #006633;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">📚 Biblioteca ULEAM</div>
    <div class="nav">
      <a href="dashboard-estudiante.html">🏠 Inicio</a>
      <a href="catalogo.html" class="active">📖 Catálogo</a>
      <a href="mis-prestamos.html">📚 Mis Préstamos</a>
      <a href="quejas.html">⚠️ Quejas</a>
      <a href="perfil.html">👤 Mi Perfil</a>
    </div>
    <div style="padding:20px; margin-top:auto;">
      <button onclick="cerrarSesion()" style="width:100%; background:#C8102E; color:white;">Cerrar Sesión</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header">
      <h2 style="font-size: 2rem;">Catálogo de Libros</h2>
    </div>

    <input type="text" id="buscador" class="search-box" placeholder="Buscar por título, autor o año...">

    <div class="grid" id="gridLibros"></div>
  </div>

  <script>
    const libros = [
      {titulo:"Cien Años de Soledad", autor:"Gabriel García Márquez", año:1967},
      {titulo:"1984", autor:"George Orwell", año:1949},
      {titulo:"El Principito", autor:"Antoine de Saint-Exupéry", año:1943},
      {titulo:"Rayuela", autor:"Julio Cortázar", año:1963},
      {titulo:"Don Quijote de la Mancha", autor:"Miguel de Cervantes", año:1605},
      {titulo:"Crónica de una muerte anunciada", autor:"Gabriel García Márquez", año:1981},
      {titulo:"La Casa de los Espíritus", autor:"Isabel Allende", año:1982},
      {titulo:"Ficciones", autor:"Jorge Luis Borges", año:1944}
    ];

    function renderLibros(filtro = '') {
      const container = document.getElementById('gridLibros');
      container.innerHTML = '';

      const filtrados = libros.filter(l => 
        l.titulo.toLowerCase().includes(filtro) || 
        l.autor.toLowerCase().includes(filtro)
      );

      filtrados.forEach(l => {
        const div = document.createElement('div');
        div.className = 'book-card';
        div.innerHTML = `
          <div class="book-cover">📖</div>
          <div style="padding:20px;">
            <h4 style="margin-bottom:8px;">${l.titulo}</h4>
            <p style="color:#666; font-size:0.95rem;">${l.autor}</p>
            <p style="color:#888; font-size:0.85rem; margin-top:8px;">${l.año}</p>
            <button onclick="solicitar('${l.titulo}')" style="margin-top:15px;">Solicitar Préstamo</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function solicitar(titulo) {
      alert(`✅ Préstamo solicitado: ${titulo}\n\nPeríodo máximo: 14 días`);
    }

    function cerrarSesion() {
      if (confirm("¿Cerrar sesión?")) window.location.href = "index.html";
    }

    // Buscador en tiempo real
    document.getElementById('buscador').addEventListener('input', (e) => {
      renderLibros(e.target.value.toLowerCase());
    });

    // Inicializar
    renderLibros();
  </script>
</body>
</html>
