<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Inteligente ULEAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #006633 0%, #003087 100%); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-[#006633]">Biblioteca Inteligente</h1>
      <p class="text-gray-600">Universidad Laica Eloy Alfaro de Manabí</p>
    </div>

    <h2 class="text-2xl font-semibold text-center mb-8">Iniciar Sesión</h2>

    <div class="space-y-6">
      <input id="email" type="email" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#006633]" 
             placeholder="usuario@uleam.edu.ec" value="estudiante@uleam.edu.ec">
      
      <input id="password" type="password" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#006633]" 
             placeholder="Contraseña" value="123456">

      <button onclick="login()" 
              class="w-full bg-[#006633] hover:bg-[#005522] text-white py-4 rounded-2xl font-semibold text-lg transition">
        Iniciar Sesión
      </button>
    </div>
  </div>

  <script>
    function login() {
      const email = document.getElementById('email').value.toLowerCase();
      
      if (email.includes("admin")) {
        window.location.href = "dashboard-admin.html";
      } else {
        window.location.href = "dashboard-estudiante.html";
      }
    }
  </script>
</body>
</html>
