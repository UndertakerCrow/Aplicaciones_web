<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quejas y Reclamos - Biblioteca ULEAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <div class="w-72 bg-[#006633] text-white flex flex-col">
      <div class="p-6 border-b border-green-700">
        <h1 class="text-2xl font-bold">Biblioteca ULEAM</h1>
      </div>
      <nav class="p-4 space-y-1">
        <a href="dashboard-estudiante.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-home"></i> Inicio</a>
        <a href="catalogo.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-book"></i> Catálogo</a>
        <a href="mis-prestamos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-hand-holding"></i> Mis Préstamos</a>
        <a href="quejas.html" class="flex items-center gap-3 px-4 py-3 bg-green-700 rounded-xl"><i class="fas fa-exclamation-triangle"></i> Quejas / Reclamos</a>
        <a href="perfil.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-user"></i> Mi Perfil</a>
      </nav>

      <!-- Botón Salir -->
      <div class="p-4 border-t border-green-700 mt-auto">
        <button onclick="cerrarSesion()"
                class="w-full flex items-center justify-center gap-3 px-4 py-3 hover:bg-red-700 rounded-xl text-white transition">
          <i class="fas fa-sign-out-alt"></i>
          <span class="font-medium">Salir</span>
        </button>
      </div>
    </div>

    <div class="flex-1 p-8 overflow-auto">
      <h2 class="text-3xl font-semibold mb-8">Quejas y Reclamos</h2>
      
      <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-lg p-10">
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium mb-2">Tipo de Queja</label>
            <select id="tipoQueja" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#006633]">
              <option value="">Seleccione un tipo...</option>
              <option>Libro dañado o deteriorado</option>
              <option>Préstamo con error</option>
              <option>Demora en atención</option>
              <option>Otro</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Libro Relacionado (Opcional)</label>
            <input id="libroQueja" type="text" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#006633]" placeholder="Ej: Cien Años de Soledad">
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Descripción del problema</label>
            <textarea id="descripcion" rows="7" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#006633]" placeholder="Explica detalladamente tu queja..."></textarea>
          </div>

          <button onclick="enviarQueja()" 
                  class="w-full bg-[#C8102E] hover:bg-red-700 text-white py-4 rounded-2xl font-semibold text-lg transition">
            Enviar Queja / Reclamo
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function enviarQueja() {
      if (!document.getElementById('tipoQueja').value || !document.getElementById('descripcion').value) {
        alert("Por favor completa el tipo de queja y la descripción.");
        return;
      }
      alert("✅ Tu queja ha sido enviada correctamente.\nSoporte Técnico la revisará en breve.");
      document.getElementById('descripcion').value = '';
      document.getElementById('libroQueja').value = '';
    }

    function cerrarSesion() {
      if (confirm("¿Estás seguro de que deseas cerrar sesión?")) {
        window.location.href = "index.html";
      }
    }
  </script>
</body>
</html>
