<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - Biblioteca ULEAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-[#006633] text-white flex flex-col">
      <div class="p-6 border-b border-green-700">
        <h1 class="text-2xl font-bold">Biblioteca ULEAM</h1>
      </div>
      <nav class="p-4 space-y-1">
        <a href="dashboard-estudiante.html" class="flex items-center gap-3 px-4 py-3 bg-green-700 rounded-xl"><i class="fas fa-home"></i> Inicio</a>
        <a href="catalogo.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-book"></i> Catálogo</a>
        <a href="mis-prestamos.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-hand-holding"></i> Mis Préstamos</a>
        <a href="quejas.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-exclamation-triangle"></i> Quejas / Reclamos</a>
        <a href="perfil.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-user"></i> Mi Perfil</a>
      </nav>
      
<!-- Botón Salir -->
      <div class="p-4 border-t border-green-700 mt-auto">
        <button onclick="cerrarSesion()" 
                class="w-full flex items-center justify-center gap-3 px-4 py-3 hover:bg-red-700 rounded-xl text-white transition">
          <i class="fas fa-sign-out-alt"></i>
          <span class="font-medium">Salir</span>
        </button>
      </div>
    </div>

    <!-- Main -->
    <div class="flex-1 overflow-auto">
      <header class="bg-white shadow p-5 flex justify-between items-center">
        <h2 class="text-2xl font-semibold">Bienvenido, Juan Pérez</h2>
        <div class="flex items-center gap-4">
          <i class="fas fa-bell text-xl"></i>
          <div class="w-10 h-10 bg-gray-300 rounded-full"></div>
        </div>
      </header>

      <div class="p-8">
        <h3 class="text-xl font-semibold mb-6">Recomendados para ti</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="recomendados">
          <!-- Llenado por JS -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const libros = [
      {titulo:"Cien Años de Soledad", autor:"Gabriel García Márquez"},
      {titulo:"1984", autor:"George Orwell"},
      {titulo:"El Principito", autor:"Antoine de Saint-Exupéry"},
      {titulo:"Rayuela", autor:"Julio Cortázar"}
    ];
    
    function renderRecomendados() {
      const container = document.getElementById('recomendados');
      container.innerHTML = libros.map(l => `
        <div class="bg-white rounded-2xl overflow-hidden shadow hover:shadow-xl transition">
          <div class="h-52 bg-gray-200 flex items-center justify-center text-5xl">📖</div>
          <div class="p-4">
            <h4 class="font-semibold">${l.titulo}</h4>
            <p class="text-sm text-gray-500">${l.autor}</p>
            <button onclick="alert('Redirigiendo a catálogo...')" class="mt-3 w-full bg-[#006633] text-white py-2 rounded-xl text-sm">Ver en Catálogo</button>
          </div>
        </div>
      `).join('');
    }
    renderRecomendados();

  function cerrarSesion() {
    if (confirm("¿Estás seguro de que deseas cerrar sesión?")) {
      window.location.href = "index.html";
    }
  }
  </script>
</body>
</html>
