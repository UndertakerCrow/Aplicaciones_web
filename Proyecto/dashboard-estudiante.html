<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - Biblioteca ULEAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #e2e8f0);
      min-height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #006633;
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.2);
    }
    .sidebar-header {
      padding: 25px;
      background: #005522;
      font-size: 1.8rem;
      font-weight: bold;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }
    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.15);
    }
    .main {
      margin-left: 280px;
      padding: 30px;
    }
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-8px);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }
    button {
      background: #006633;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">📚 Biblioteca ULEAM</div>
    <div class="nav">
      <a href="dashboard-estudiante.html" class="active">🏠 Inicio</a>
      <a href="catalogo.html">📖 Catálogo</a>
      <a href="mis-prestamos.html">📚 Mis Préstamos</a>
      <a href="quejas.html">⚠️ Quejas</a>
      <a href="perfil.html">👤 Mi Perfil</a>
    </div>
    <div style="padding:20px; margin-top:auto;">
      <button onclick="cerrarSesion()" style="width:100%; background:#C8102E;">Cerrar Sesión</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header">
      <div>
        <h2>Bienvenido, Juan Pérez</h2>
        <p>¿Qué vamos a leer hoy?</p>
      </div>
      <div onclick="window.location.href='perfil.html'" style="cursor:pointer; display:flex; align-items:center; gap:12px;">
        <div>
          <strong>Juan Pérez López</strong><br>
          <small>Estudiante</small>
        </div>
        <div style="width:50px; height:50px; background:#006633; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; color:white;">👤</div>
      </div>
    </div>

    <!-- Estadísticas -->
    <div class="grid" style="margin-bottom:40px;">
      <div class="card"><strong>2</strong><br>Préstamos Activos</div>
      <div class="card"><strong>2</strong><br>Por devolver pronto</div>
      <div class="card"><strong>0</strong><br>Multas</div>
    </div>

    <!-- Recomendados -->
    <h3 style="margin-bottom:20px;">Recomendados para ti</h3>
    <div class="grid" id="recomendados"></div>
  </div>

  <script>
    const libros = [
      {titulo:"Cien Años de Soledad", autor:"Gabriel García Márquez"},
      {titulo:"1984", autor:"George Orwell"},
      {titulo:"El Principito", autor:"Antoine de Saint-Exupéry"},
      {titulo:"Rayuela", autor:"Julio Cortázar"}
    ];

    function render() {
      let html = '';
      libros.forEach(l => {
        html += `
          <div class="card" onclick="window.location.href='catalogo.html'">
            <div style="height:180px; background:#e5e7eb; border-radius:16px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; font-size:60px;">📖</div>
            <h4>${l.titulo}</h4>
            <p style="color:#666; font-size:0.95rem;">${l.autor}</p>
            <button style="margin-top:15px; width:100%;">Ver en Catálogo</button>
          </div>`;
      });
      document.getElementById('recomendados').innerHTML = html;
    }

    function cerrarSesion() {
      if (confirm("¿Cerrar sesión?")) window.location.href = "index.html";
    }

    render();
  </script>
</body>
</html>
