<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - Biblioteca ULEAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #e2e8f0);
      min-height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #006633;
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.2);
    }
    .sidebar-header {
      padding: 25px;
      background: #005522;
      font-size: 1.8rem;
      font-weight: bold;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }
    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.15);
    }
    .main {
      margin-left: 280px;
      padding: 30px;
    }
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .profile-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      max-width: 700px;
    }
    .avatar {
      width: 120px;
      height: 120px;
      background: #006633;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      margin: 0 auto 20px;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 1.05rem;
    }
    button {
      background: #006633;
      color: white;
      border: none;
      padding: 16px;
      width: 100%;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">📚 Biblioteca ULEAM</div>
    <div class="nav">
      <a href="dashboard-estudiante.html">🏠 Inicio</a>
      <a href="catalogo.html">📖 Catálogo</a>
      <a href="mis-prestamos.html">📚 Mis Préstamos</a>
      <a href="quejas.html">⚠️ Quejas</a>
      <a href="perfil.html" class="active">👤 Mi Perfil</a>
    </div>
    <div style="padding:20px; margin-top:auto;">
      <button onclick="cerrarSesion()" style="width:100%; background:#C8102E; color:white;">Cerrar Sesión</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header">
      <h2 style="font-size: 2rem;">Mi Perfil</h2>
    </div>

    <div class="profile-card">
      <div class="avatar">👤</div>
      <h3 style="text-align:center; margin-bottom:8px;">Juan Pérez López</h3>
      <p style="text-align:center; color:#666; margin-bottom:30px;">estudiante@uleam.edu.ec</p>

      <label style="display:block; margin-bottom:8px; font-weight:600;">Nombre Completo</label>
      <input type="text" value="Juan Pérez López">

      <label style="display:block; margin-bottom:8px; font-weight:600;">Carrera</label>
      <input type="text" value="Ingeniería en Sistemas">

      <label style="display:block; margin-bottom:8px; font-weight:600;">Teléfono</label>
      <input type="tel" value="0987654321">

      <label style="display:block; margin-bottom:8px; font-weight:600;">Correo Institucional</label>
      <input type="email" value="estudiante@uleam.edu.ec">

      <button onclick="guardarPerfil()">Guardar Cambios</button>
    </div>
  </div>

  <script>
    function guardarPerfil() {
      alert("✅ Perfil actualizado correctamente.");
    }

    function cerrarSesion() {
      if (confirm("¿Cerrar sesión?")) window.location.href = "index.html";
    }
  </script>
</body>
</html>
