<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrar Catálogo - Admin ULEAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #e2e8f0);
      min-height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #006633;
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.2);
    }
    .sidebar-header {
      padding: 25px;
      background: #005522;
      font-size: 1.8rem;
      font-weight: bold;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }
    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.15);
    }
    .main {
      margin-left: 280px;
      padding: 30px;
    }
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .form-container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      margin-bottom: 40px;
    }
    input, select {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    button {
      background: #006633;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th { background: #006633; color: white; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">⚙️ Admin ULEAM</div>
    <div class="nav">
      <a href="dashboard-admin.html">🏠 Dashboard</a>
      <a href="gestion-usuarios.html">👥 Gestión de Usuarios</a>
      <a href="catalogo-admin.html" class="active">📖 Catálogo</a>
      <a href="prestamos-admin.html">📚 Préstamos</a>
      <a href="sanciones.html">⚠️ Sanciones</a>
      <a href="reportes.html">📊 Reportes</a>
    </div>
    <div style="padding:20px; margin-top:auto;">
      <button onclick="cerrarSesion()" style="width:100%; background:#C8102E; color:white;">Cerrar Sesión</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header">
      <h2 style="font-size: 2rem;">Administrar Catálogo</h2>
    </div>

    <!-- Formulario para registrar libro -->
    <div class="form-container">
      <h3>Registrar Nuevo Libro</h3>
      <input type="text" id="titulo" placeholder="Título del libro">
      <input type="text" id="autor" placeholder="Autor">
      <input type="text" id="isbn" placeholder="ISBN">
      <input type="number" id="año" placeholder="Año de publicación">
      <select id="categoria">
        <option value="">Seleccione categoría...</option>
        <option>Literatura</option>
        <option>Ciencia</option>
        <option>Historia</option>
        <option>Tecnología</option>
        <option>Filosofía</option>
      </select>
      <button onclick="registrarLibro()">Registrar Libro</button>
    </div>

    <!-- Lista de libros -->
    <h3>Libros Registrados</h3>
    <table>
      <tr>
        <th>Título</th>
        <th>Autor</th>
        <th>Año</th>
        <th>Categoría</th>
        <th>Acciones</th>
      </tr>
      <tr>
        <td>Cien Años de Soledad</td>
        <td>Gabriel García Márquez</td>
        <td>1967</td>
        <td>Literatura</td>
        <td><button>Editar</button> <button style="background:#C8102E;">Eliminar</button></td>
      </tr>
      <tr>
        <td>1984</td>
        <td>George Orwell</td>
        <td>1949</td>
        <td>Literatura</td>
        <td><button>Editar</button> <button style="background:#C8102E;">Eliminar</button></td>
      </tr>
    </table>
  </div>

  <script>
    function registrarLibro() {
      const titulo = document.getElementById('titulo').value;
      if (titulo) {
        alert(`✅ Libro "${titulo}" registrado correctamente.`);
        // Limpiar formulario
        document.getElementById('titulo').value = '';
        document.getElementById('autor').value = '';
      } else {
        alert("Por favor ingresa al menos el título.");
      }
    }

    function cerrarSesion() {
      if (confirm("¿Cerrar sesión?")) window.location.href = "index.html";
    }
  </script>
</body>
</html>
