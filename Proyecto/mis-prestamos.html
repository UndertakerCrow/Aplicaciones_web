<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Préstamos - Biblioteca ULEAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-[#006633] text-white flex flex-col">
      <div class="p-6 border-b border-green-700">
        <h1 class="text-2xl font-bold">Biblioteca ULEAM</h1>
      </div>
      <nav class="p-4 space-y-1">
        <a href="dashboard-estudiante.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-home"></i> Inicio</a>
        <a href="catalogo.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-book"></i> Catálogo</a>
        <a href="mis-prestamos.html" class="flex items-center gap-3 px-4 py-3 bg-green-700 rounded-xl"><i class="fas fa-hand-holding"></i> Mis Préstamos</a>
        <a href="quejas.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-exclamation-triangle"></i> Quejas</a>
        <a href="perfil.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-xl"><i class="fas fa-user"></i> Mi Perfil</a>
      </nav>

      <!-- Botón Salir -->
      <div class="p-4 border-t border-green-700 mt-auto">
        <button onclick="cerrarSesion()" 
                class="w-full flex items-center justify-center gap-3 px-4 py-3 hover:bg-red-700 rounded-xl text-white transition">
          <i class="fas fa-sign-out-alt"></i>
          <span class="font-medium">Salir</span>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-auto">
      <header class="bg-white shadow p-5">
        <h2 class="text-2xl font-semibold">Mis Préstamos</h2>
      </header>

      <div class="p-8">
        <div id="listaPrestamos" class="space-y-6">
          <!-- Llenado por JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <script>
    let prestamos = [
      {
        titulo: "Cien Años de Soledad",
        autor: "Gabriel García Márquez",
        fechaPrestamo: "28/04/2026",
        fechaDevolucion: "12/05/2026",
        estado: "Activo"
      },
      {
        titulo: "1984",
        autor: "George Orwell",
        fechaPrestamo: "25/04/2026",
        fechaDevolucion: "09/05/2026",
        estado: "Activo"
      }
    ];

    function renderPrestamos() {
      const container = document.getElementById('listaPrestamos');
      container.innerHTML = prestamos.map((p, index) => `
        <div class="bg-white rounded-2xl shadow p-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div>
            <h4 class="font-semibold text-lg">${p.titulo}</h4>
            <p class="text-gray-600">${p.autor}</p>
            <p class="text-sm text-gray-500 mt-2">
              Prestado: ${p.fechaPrestamo} | Devolución: <span class="font-medium">${p.fechaDevolucion}</span>
            </p>
          </div>
          <div class="flex flex-col items-end gap-3">
            <span class="px-4 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">${p.estado}</span>
            <button onclick="devolverLibro(${index})" 
                    class="text-red-600 hover:text-red-700 text-sm font-medium flex items-center gap-1">
              <i class="fas fa-undo"></i> Marcar como Devuelto
            </button>
          </div>
        </div>
      `).join('');
    }

    function devolverLibro(index) {
      if (confirm("¿Deseas marcar este libro como devuelto?")) {
        prestamos.splice(index, 1);
        renderPrestamos();
        alert("✅ Libro marcado como devuelto correctamente.");
      }
    }

    renderPrestamos();

    function cerrarSesion() {
      if (confirm("¿Estás seguro de que deseas cerrar sesión?")) {
        window.location.href = "index.html";
      }
    }
  </script>
</body>
</html>
