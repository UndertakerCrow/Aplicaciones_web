<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Préstamos - Biblioteca ULEAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #e2e8f0);
      min-height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #006633;
      color: white;
      height: 100vh;
      position: fixed;
      box-shadow: 4px 0 15px rgba(0,0,0,0.2);
    }
    .sidebar-header {
      padding: 25px;
      background: #005522;
      font-size: 1.8rem;
      font-weight: bold;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }
    .nav a:hover, .nav a.active {
      background: rgba(255,255,255,0.15);
    }
    .main {
      margin-left: 280px;
      padding: 30px;
    }
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .prestamo-card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      transition: 0.3s;
    }
    .prestamo-card:hover {
      transform: translateY(-5px);
    }
    button {
      background: #C8102E;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">📚 Biblioteca ULEAM</div>
    <div class="nav">
      <a href="dashboard-estudiante.html">🏠 Inicio</a>
      <a href="catalogo.html">📖 Catálogo</a>
      <a href="mis-prestamos.html" class="active">📚 Mis Préstamos</a>
      <a href="quejas.html">⚠️ Quejas</a>
      <a href="perfil.html">👤 Mi Perfil</a>
    </div>
    <div style="padding:20px; margin-top:auto;">
      <button onclick="cerrarSesion()" style="width:100%; background:#C8102E;">Cerrar Sesión</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header">
      <h2 style="font-size: 2rem;">Mis Préstamos</h2>
    </div>

    <div id="listaPrestamos"></div>
  </div>

  <script>
    let prestamos = [
      {
        titulo: "Cien Años de Soledad",
        autor: "Gabriel García Márquez",
        fechaPrestamo: "28/04/2026",
        fechaDevolucion: "12/05/2026",
        estado: "Activo"
      },
      {
        titulo: "1984",
        autor: "George Orwell",
        fechaPrestamo: "25/04/2026",
        fechaDevolucion: "09/05/2026",
        estado: "Activo"
      }
    ];

    function renderPrestamos() {
      const container = document.getElementById('listaPrestamos');
      container.innerHTML = '';

      prestamos.forEach((p, index) => {
        const div = document.createElement('div');
        div.className = 'prestamo-card';
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:start;">
            <div>
              <h3 style="margin-bottom:8px;">${p.titulo}</h3>
              <p style="color:#555;">${p.autor}</p>
              <p style="margin-top:15px; color:#666; font-size:0.95rem;">
                Prestado: ${p.fechaPrestamo}<br>
                Devolución: <strong style="color:#C8102E;">${p.fechaDevolucion}</strong>
              </p>
            </div>
            <div style="text-align:right;">
              <span style="background:#d1fae5; color:#10b981; padding:6px 16px; border-radius:20px; font-size:0.9rem;">
                ${p.estado}
              </span>
              <br><br>
              <button onclick="devolverLibro(${index})">Marcar como Devuelto</button>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function devolverLibro(index) {
      if (confirm("¿Marcar este libro como devuelto?")) {
        prestamos.splice(index, 1);
        renderPrestamos();
      }
    }

    function cerrarSesion() {
      if (confirm("¿Cerrar sesión?")) window.location.href = "index.html";
    }

    // Inicializar
    renderPrestamos();
  </script>
</body>
</html>
