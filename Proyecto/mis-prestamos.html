<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Préstamos - Biblioteca ULEAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(to bottom, #f8fafc, #e2e8f0); }
    .prestamo-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .prestamo-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
  </style>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-[#006633] text-white flex flex-col shadow-2xl">
      <div class="p-6 border-b border-green-700 bg-[#005522]">
        <h1 class="text-2xl font-bold flex items-center gap-3">
          <span class="text-3xl">📚</span> Biblioteca ULEAM
        </h1>
      </div>
      <nav class="p-4 flex-1 space-y-1">
        <a href="dashboard-estudiante.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-2xl"><i class="fas fa-home"></i> Inicio</a>
        <a href="catalogo.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-2xl"><i class="fas fa-book"></i> Catálogo</a>
        <a href="mis-prestamos.html" class="flex items-center gap-3 px-4 py-3 bg-green-700 rounded-2xl"><i class="fas fa-hand-holding"></i> Mis Préstamos</a>
        <a href="quejas.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-2xl"><i class="fas fa-exclamation-triangle"></i> Quejas</a>
        <a href="perfil.html" class="flex items-center gap-3 px-4 py-3 hover:bg-green-700 rounded-2xl"><i class="fas fa-user"></i> Mi Perfil</a>
      </nav>
      <div class="p-4 border-t border-green-700 mt-auto">
        <button onclick="cerrarSesion()" 
                class="w-full flex items-center justify-center gap-3 px-4 py-3 hover:bg-red-700 rounded-2xl text-white transition">
          <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-auto">
      <header class="bg-white shadow-sm border-b p-6">
        <h2 class="text-3xl font-semibold text-gray-800">Mis Préstamos</h2>
      </header>

      <div class="p-8 space-y-8" id="listaPrestamos">
        <!-- Tarjetas con más espacio -->
      </div>
    </div>
  </div>

  <script>
    let prestamos = [
      {
        titulo: "Cien Años de Soledad",
        autor: "Gabriel García Márquez",
        fechaP: "28/04/2026",
        fechaD: "12/05/2026",
        estado: "Activo"
      },
      {
        titulo: "1984",
        autor: "George Orwell",
        fechaP: "25/04/2026",
        fechaD: "09/05/2026",
        estado: "Activo"
      }
    ];

    function renderPrestamos() {
      const container = document.getElementById('listaPrestamos');
      container.innerHTML = prestamos.map((p, i) => `
        <div class="prestamo-card bg-white rounded-3xl shadow p-8">
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="flex-1">
              <h4 class="text-2xl font-semibold text-gray-800">${p.titulo}</h4>
              <p class="text-gray-600 mt-1">${p.autor}</p>
              <div class="mt-4 text-sm text-gray-500">
                Prestado: <span class="font-medium">${p.fechaP}</span> — 
                Devolución: <span class="font-medium text-red-600">${p.fechaD}</span>
              </div>
            </div>
            
            <div class="flex flex-col items-end gap-4">
              <span class="px-6 py-2 bg-green-100 text-green-700 font-medium rounded-full">
                ${p.estado}
              </span>
              <button onclick="devolverLibro(${i})" 
                      class="flex items-center gap-2 text-red-600 hover:text-red-700 font-medium transition">
                <i class="fas fa-undo"></i> 
                Marcar como Devuelto
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function devolverLibro(i) {
      if (confirm("¿Marcar este libro como devuelto?")) {
        prestamos.splice(i, 1);
        renderPrestamos();
      }
    }

    function cerrarSesion() {
      if (confirm("¿Estás seguro de que deseas cerrar sesión?")) {
        window.location.href = "index.html";
      }
    }

    renderPrestamos();
  </script>
</body>
</html>
