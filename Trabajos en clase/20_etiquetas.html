<!DOCTYPE html5>
<html lang="es">
    <head>
    <title>Documentación de 20 etiquetas HTML</title>
</head>
<body>
    <h1>Título principal de la página</h1>
    <h2>Subtítulo</h2>
    <p>texto x para la tarea.</p>
    <a href="https://www.google.com" target="_blank">Ir a Google</a><br>
    Línea uno<hr>Línea dos<br>
    Este texto es <strong>muy importante</strong>.<br>
    Este texto está <em>enfatizado</em><br>
    <div class="contenedor">Contenido dentro de un div</div>
    Este es un <span style="color:red;">texto rojo</span>
    <ul>
    <li>Elemento 1</li>
    <li>Elemento 2</li>
</ul>
<ol>
    <li>Primer paso</li>
    <li>Segundo paso</li>
</ol>
<table border="1">
    <tr><td>Celda 1</td><td>Celda 2</td></tr>
</table>
<form>
    <label>Nombre:</label>
    <input type="text">
    <button type="submit">Enviar</button>
</form>
</body>
</html>
